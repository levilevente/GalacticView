name: CORE BACKEND CI

on:
  push:
    branches: [main, dev, feature/**]
    paths:
      - "apps/core-backend/**"
  pull_request:
    branches: [main, dev, feature/**]
    paths:
      - "apps/core-backend/**"
  workflow_dispatch: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/core-backend

    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('apps/core-backend/poetry.lock') }}

      - name: Install dependencies (including dev)
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction

      - name: Ensure linters are available (fallback)
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy

      - name: Lint with ruff
        run: |
          poetry run ruff check .

      - name: Type check with mypy
        run: |
          poetry run mypy .

      - name: Show Python packages
        run: python -m pip list

  build:
    name: Build package
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: apps/core-backend

    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('apps/core-backend/poetry.lock') }}

      - name: Install dependencies (no dev)
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction

      - name: Build artifacts
        run: |
          poetry build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: core-backend-dist
          path: apps/core-backend/dist/*
          retention-days: 1
